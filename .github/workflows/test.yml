name: Test SPDX Checker Action

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run SPDX Checker
        uses: ./
        with:
          target-license: 'MIT'
          continue-on-error: 'false'