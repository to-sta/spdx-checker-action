name: 'SPDX Checker'
description: 'Check SPDX license identifiers in your project'
author: 'Your Name'

inputs:
  target-license:
    description: 'Target SPDX license identifier to check for'
    required: false
    default: ''
  file-paths:
    description: 'Comma-separated list of file paths to check. Leave empty to auto-detect changed files in PR.'
    required: false
    default: ''
  extensions:
    description: 'Comma-separated list of file extensions to check'
    required: false
    default: ''
  exclude:
    description: 'Comma-separated list of patterns to exclude'
    required: false
    default: ''
  continue-on-error:
    description: 'Continue checking even if errors are found'
    required: false
    default: 'false'
  fix:
    description: 'Automatically fix license headers'
    required: false
    default: 'false'

outputs:
  result:
    description: 'Result of the SPDX check'
    value: ${{ steps.spdx-check.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    
    - name: Install spdx_checker
      shell: bash
      run: |
        uv venv
        uv pip install spdx_checker==0.1.21
    
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v45
      with:
        separator: ','
    
    - name: Run SPDX Checker
      id: spdx-check
      shell: bash
      run: |
        source .venv/bin/activate
        python ${{ github.action_path }}/main.py \
          --target-license "${{ inputs.target-license }}" \
          --file-paths "${{ inputs.file-paths }}" \
          --changed-files "${{ steps.changed-files.outputs.all_changed_files }}" \
          --extensions "${{ inputs.extensions }}" \
          --exclude "${{ inputs.exclude }}" \
          --continue-on-error "${{ inputs.continue-on-error }}" \
          --fix "${{ inputs.fix }}"
